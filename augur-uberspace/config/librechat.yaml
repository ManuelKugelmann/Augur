# LibreChat configuration
# MCP servers: augur signals stack + external data MCPs
# Multi-agent architecture: see docs/multi-agent-architecture.md
version: 1.2.1

cache: true

registration:
  socialLogins: []

interface:
  endpointsMenu: true
  remoteAgents:
    use: true
    create: true

# ── MCP Servers ─────────────────────────────
# All MCPs use chatMenu: false — accessible only via agents, not general chat.
# Augur MCP: signals stack under ~/augur/
# External MCPs: third-party data sources
#
# IMPORTANT: setup.sh replaces __HOME__ with your actual $HOME path.
# If editing manually, replace __HOME__ with e.g. /home/youruser
mcpServers:

  # ── Augur Server (signals store + 12 data domains, one process) ──
  # Runs as streamable-http so LibreChat injects per-user headers.
  # Env vars + API keys are set in the systemd service, not here.

  augur:
    type: streamable-http
    url: http://localhost:8071/mcp
    chatMenu: false
    headers:
      X-User-ID: "{{LIBRECHAT_USER_ID}}"
      X-User-Email: "{{LIBRECHAT_USER_EMAIL}}"
      X-Broker-Key: "{{BROKER_API_KEY}}"
      X-Broker-Secret: "{{BROKER_API_SECRET}}"
      X-Broker-Name: "{{BROKER_NAME}}"
      X-Risk-Daily-Limit: "{{RISK_DAILY_LIMIT}}"
      X-Risk-Live-Trading: "{{RISK_LIVE_TRADING}}"
      X-Ntfy-Topic: "{{NTFY_TOPIC}}"
    customUserVars:
      BROKER_API_KEY:
        title: "Broker API Key"
        description: "Your trading broker API key (e.g. Alpaca, IBKR). Leave blank for OSINT-only mode."
      BROKER_API_SECRET:
        title: "Broker API Secret"
        description: "Your trading broker API secret. Never shared with other users."
      BROKER_NAME:
        title: "Broker Name"
        description: "Your broker platform: alpaca, ibkr, binance, etc. Used to select the right API adapter."
      RISK_DAILY_LIMIT:
        title: "Daily Action Limit"
        description: "Max trading actions per day (default: 50). Set lower for safety."
      RISK_LIVE_TRADING:
        title: "Enable Live Trading"
        description: "Set to 'yes' to allow real trades. Leave blank for dry-run only (paper trading)."
      NTFY_TOPIC:
        title: "Notification Topic"
        description: "Your ntfy.sh topic for push notifications (plan alerts, trade confirmations). Create one at ntfy.sh."
    serverInstructions: |
      Augur signals server: store_* tools + 12 OSINT data domains + ta_* technical indicators.

      STORE: Profile = what an entity IS (MongoDB). Snapshot = what was MEASURED when (MongoDB timeseries).
        store_chart returns Plotly HTML — output it directly as an artifact.
        Notes (store_save_note etc.) are per-user — plans, watchlists, journals.
        Risk gate: dry-run by default. Users enable live trading in Settings > Plugins.

      PROFILES: MongoDB-backed (profiles_{kind} collections). Organized by region + kind.
        Regions: north_america, latin_america, europe, mena, sub_saharan_africa,
          south_asia, east_asia, southeast_asia, central_asia, oceania, arctic, antarctic, global.
        Kinds: countries, stocks, etfs, crypto, indices, commodities, crops, materials,
          products, companies, sources.
        Non-geographic kinds (etfs, commodities, crops, etc.) use region=global.
        Required: id + name only. Recommended fields per kind in put_profile docstring.
        ID conventions: countries=ISO3 (DEU), stocks/etfs/crypto/indices=ticker (AAPL),
        others=lowercase slug (crude_oil). Use store_lint_profiles to audit.

      DATA: Tools prefixed by domain (weather_, disaster_, econ_, agri_, conflict_,
        commodity_, health_, politics_, transport_, water_, humanitarian_, infra_).
        Most free/no-key. Some need optional keys (FRED, ACLED, EIA, IDMC, CF_API_TOKEN).

      INDICATORS (ta_* tools): Use ta_analyze_full for complete analysis of any ticker
        (SMA, RSI, MACD, Bollinger) in one call. Fetches Yahoo Finance prices automatically.
        Based on 114K-backtest study: SMA(200) trend filter + RSI/MACD/Bollinger for timing.

  # ── External MCPs (Tier 1 — genuinely additive data) ──

  finance:
    command: python
    args: ["-m", "finance_mcp"]
    chatMenu: false
    serverInstructions: |
      Stock data + technical analysis via yfinance + ta library.
      Key tools: get_technical_analysis (SMA, EMA, RSI, MACD, Bollinger, support/resistance),
      get_comprehensive_stock_info, get_historical_data, get_options_data,
      get_analyst_recommendations, get_financial_statements, get_sector_performance,
      get_dividend_history, get_earnings_calendar, get_news.
      Replaces yahoo-finance MCP. Install: pip install finance-mcp-server.

  gdelt-cloud:
    type: streamable-http
    url: https://gdelt-cloud-mcp.fastmcp.app/mcp
    chatMenu: false
    serverInstructions: "Global news monitoring and event detection via GDELT."

  prediction-markets:
    command: node
    args: ["__HOME__/augur/mcp-nodes/node_modules/.bin/prediction-markets-mcp"]
    chatMenu: false
    serverInstructions: "Polymarket, Metaculus prediction market data."

  rss:
    command: node
    args: ["__HOME__/augur/mcp-nodes/node_modules/rss-mcp/index.js"]
    chatMenu: false
    serverInstructions: "RSS/Atom feed reader for news, SEC filings, blog monitoring."

  reddit:
    command: uvx
    args: ["mcp-server-reddit"]
    chatMenu: false
    serverInstructions: "Reddit post/comment search for sentiment and signal detection."

  # ── External MCPs (Tier 1.5 — general web access) ──

  fetch:
    command: uvx
    args: ["mcp-server-fetch"]
    chatMenu: false
    serverInstructions: "Fetch any URL and extract contents as markdown. Use for reading web pages, SEC filings, press releases, API docs, or any public URL. No API key needed."

  webresearch:
    command: npx
    args: ["-y", "@mzxrai/mcp-webresearch@latest"]
    chatMenu: false
    serverInstructions: "Google web search + page scraping. Use search_google for queries, visit_page to read/extract content, take_screenshot for visual capture. No API key needed. Best for real-time news, company research, regulatory updates, and any question requiring current web data."

  google-news:
    command: uvx
    args: ["--refresh", "--with", "fastmcp>=2.9.2,<3", "google-news-trends-mcp@latest"]
    chatMenu: false
    serverInstructions: "Google News + Google Trends. Tools: get_top_news (headlines), get_news_by_keyword (search), get_news_by_topic (BUSINESS/TECHNOLOGY/SCIENCE/HEALTH/SPORTS/ENTERTAINMENT/WORLD/NATION), get_news_by_location (country/region news), get_trending_keywords (Google Trends by location). No API key needed. Best for structured news monitoring and trend detection."

  tavily:
    type: streamable-http
    url: "https://mcp.tavily.com/mcp/?tavilyApiKey={{TAVILY_API_KEY}}"
    chatMenu: false
    customUserVars:
      TAVILY_API_KEY:
        title: "Tavily API Key"
        description: "Web search API key (free: 1000 searches/month). Get one at tavily.com."
    serverInstructions: "Web search via Tavily API. Higher-quality search results than Google scraping. Use for precise research queries. Free tier: 1000 searches/month. Requires API key in Settings > Plugins."

  # ── External MCPs (Tier 2 — additive analytics & signals) ──

  hackernews:
    command: node
    args: ["__HOME__/augur/mcp-nodes/node_modules/.bin/hn-mcp-server"]
    chatMenu: false
    serverInstructions: "Hacker News stories, comments, Algolia search. Tech/startup sentiment signal."

  arxiv:
    command: uv
    args: ["tool", "run", "arxiv-mcp-server"]
    chatMenu: false
    serverInstructions: "arXiv paper search, metadata, download. Research signal for thematic plays (AI, biotech, materials, etc.)."

  math:
    command: uv
    args: ["tool", "run", "mcp-mathematics"]
    chatMenu: false
    serverInstructions: "52 math functions, 158 unit conversions, financial calcs (NPV, IRR, loan amortization). AST-secure eval."

  regression:
    command: uvx
    args: ["mcp-ols"]
    chatMenu: false
    serverInstructions: "OLS + logistic regression, residual diagnostics, VIF, Cook's distance. Reads CSV/Excel/JSON/Parquet/SQLite."

  crypto-sentiment:
    command: uv
    args: ["--directory", "__HOME__/augur/vendor/crypto-feargreed-mcp", "run", "main.py"]
    chatMenu: false
    serverInstructions: "Real-time + historical Crypto Fear & Greed Index. Sentiment signal for crypto markets."


# ── Agents Endpoint ─────────────────────────
# Required for multi-agent handoffs and Agent Chain pipelines.
endpoints:
  agents:
    recursionLimit: 25
    maxRecursionLimit: 50
    capabilities:
      - tools
      - actions
      - artifacts
      - chain

