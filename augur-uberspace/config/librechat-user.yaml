# LibreChat user overrides — your customizations go here.
# Preserved across updates. Edit with: augur yaml
#
# System settings (MCP servers, version, mcpSettings) come from
# librechat-system.yaml and are managed by Augur — not editable here.
#
# Native providers (OpenAI, Anthropic) need NO YAML — just set the key
# in .env and they appear automatically. Custom providers below need
# both the .env key AND an uncommented endpoint block.
# See docs/llm-keys.md for full provider reference.

cache: true

registration:
  socialLogins: []

# ── Web Search ────────────────────────────
# Adds inline search results in chat (no agent needed).
# Pick ONE provider: SearXNG (free) or Serper (2,500 free/mo).
# Set the matching env var in .env (augur env), then uncomment.

# Option A: SearXNG (free, public instance or self-hosted)
# Public instances: https://searx.space — pick one with good uptime.
# Self-hosted: pip install searxng (or Docker)
webSearch:
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"

# Option B: Serper (2,500 free searches/month, Google results)
# Key: https://serper.dev
#
# webSearch:
#   serperApiKey: "${SERPER_API_KEY}"

# ── LLM Endpoints ──────────────────────────
# Set the API key in .env (augur env) for each provider you want to use.
# Providers without a valid key will show an error — comment out unused ones.
# fetch: false = show only the curated default list (not the full provider catalog).

endpoints:
  custom:

    # ── Groq (free, very fast inference) ──
    # Key: https://console.groq.com/keys
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          - llama-3.3-70b-versatile
          - llama-3.1-8b-instant
        fetch: true
      titleConvo: true
      titleModel: "llama-3.1-8b-instant"
      modelDisplayLabel: "Groq"

    # ── Google Gemini (free tier, 15 RPM / 1M TPD) ──
    # Key: https://aistudio.google.com/apikey
    - name: "Gemini"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      models:
        default:
          - gemini-2.5-flash
          - gemini-2.5-pro
          - gemini-3-flash-preview
        fetch: false
      titleConvo: true
      titleModel: "gemini-2.5-flash"
      modelDisplayLabel: "Gemini"

    # ── Mistral (free tier: mistral-small) ──
    # Key: https://console.mistral.ai/api-keys
    - name: "Mistral"
      apiKey: "${MISTRAL_API_KEY}"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default:
          - mistral-small-latest
          - mistral-large-latest
          - magistral-small-latest
          - magistral-medium-latest
        fetch: false
      titleConvo: true
      titleModel: "mistral-small-latest"
      modelDisplayLabel: "Mistral"

    # ── Cerebras (free, 30 RPM / 14.4K RPD, fast inference) ──
    # Key: https://cloud.cerebras.ai
    - name: "Cerebras"
      apiKey: "${CEREBRAS_API_KEY}"
      baseURL: "https://api.cerebras.ai/v1"
      models:
        default:
          - llama3.1-8b
        fetch: true
      titleConvo: true
      titleModel: "llama3.1-8b"
      modelDisplayLabel: "Cerebras"

    # ── Cohere (free, 20 RPM / 1K req/month) ──
    # Key: https://dashboard.cohere.com/api-keys
    - name: "Cohere"
      apiKey: "${COHERE_API_KEY}"
      baseURL: "https://api.cohere.com/compatibility/v1"
      models:
        default:
          - command-a-03-2025
          - command-a-reasoning-08-2025
          - command-r7b-12-2024
        fetch: false
      titleConvo: true
      titleModel: "command-r7b-12-2024"
      modelDisplayLabel: "Cohere"

    # ── GitHub Models (free, uses GitHub PAT) ──
    # Key: https://github.com/settings/tokens (classic PAT or fine-grained with "Models" read permission)
    - name: "GitHub Models"
      apiKey: "${GITHUB_MODELS_PAT}"
      baseURL: "https://models.inference.ai.azure.com"
      models:
        default:
          - gpt-4o-mini
          - Phi-4
        fetch: false
      titleConvo: true
      titleModel: "gpt-4o-mini"
      modelDisplayLabel: "GitHub Models"

    # ── Alibaba Cloud / Qwen (free 1M tokens/month) ──
    # Key: https://dashscope.console.aliyun.com/apiKey
    - name: "Qwen"
      apiKey: "${DASHSCOPE_API_KEY}"
      baseURL: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
      models:
        default:
          - qwen3-max
          - qwen-plus
          - qwen-flash
        fetch: false
      titleConvo: true
      titleModel: "qwen-flash"
      modelDisplayLabel: "Qwen"

    # ── OpenRouter (some free models with :free suffix) ──
    # Key: https://openrouter.ai/keys
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openai/gpt-oss-120b:free"
          - "nvidia/nemotron-3-super-120b-a12b:free"
          - "meta-llama/llama-3.3-70b-instruct:free"
          - "nousresearch/hermes-3-llama-3.1-405b:free"
        fetch: true
      titleConvo: true
      titleModel: "openai/gpt-oss-120b:free"
      modelDisplayLabel: "OpenRouter"

    # ── Claude Max (subscription via CLIProxyAPI) ──
    # Requires: augur proxy setup + token in ~/.claude-auth.env
    # See docs/claude-token-wrapper.md for full setup guide.
    # - name: "Claude Max"
    #   apiKey: "dummy"
    #   baseURL: "http://localhost:8317/v1"
    #   models:
    #     default:
    #       - claude-sonnet-4-6
    #       - claude-opus-4-6
    #       - claude-haiku-4-5-20251001
    #     fetch: false
    #   titleConvo: true
    #   titleModel: "claude-sonnet-4-6"
    #   directEndpoint: true
    #   summarize: false
