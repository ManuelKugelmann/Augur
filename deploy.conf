# deploy.conf — Central configuration for MCP Signals Stack + LibreChat
# All scripts source this file. Edit once, applies everywhere.
# Override any value via environment: UBER_USER=other augur install

# ── Uberspace ──────────────────────────────────
UBER_USER="${UBER_USER:-augur}"
UBER_HOST="${UBER_HOST:-${UBER_USER}.uber.space}"

# ── GitHub ─────────────────────────────────────
GH_USER="${GH_USER:-ManuelKugelmann}"
GH_REPO="${GH_REPO:-Augur}"

# ── Directories (resolved at runtime via $HOME) ─
STACK_DIR="${STACK_DIR:-$HOME/augur}"
APP_DIR="${APP_DIR:-$HOME/LibreChat}"

# ── Backups ────────────────────────────────────
BACKUP_DIR="${BACKUP_DIR:-$HOME/backups/mongo}"

# ── Ports ──────────────────────────────────────
LC_PORT="${LC_PORT:-3080}"

# ── Python ────────────────────────────────────
# Auto-detected if empty (scans 3.13→3.10). Override for a specific version.
PYTHON_VERSION="${PYTHON_VERSION:-}"

# ── Release ───────────────────────────────────
# Pin to a specific release tag (e.g. "dev-abc1234", "v0.1.0-rc1").
# Empty = use /releases/latest (production default).
# Set to "prerelease" to auto-pick the newest prerelease.
RELEASE_TAG="${RELEASE_TAG:-}"

# ── Node.js ────────────────────────────────────
NODE_VERSION="${NODE_VERSION:-22}"

# ── MCP Nodes ──────────────────────────────────
# Pin to a specific MCP nodes bundle tag (e.g. "mcp-nodes-v20260312").
# Empty = use latest rolling build (mcp-nodes-build).
MCP_NODES_TAG="${MCP_NODES_TAG:-}"
