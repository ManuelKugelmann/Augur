# Build vanilla LibreChat for Uberspace deployment.
# Pure pre-built LibreChat — no Augur-specific config inside.
# The installer (augur install) overlays config/scripts from the mcps repo.
#
# Trigger: Actions → Build LibreChat → Run workflow
#
# Creates two releases per build:
#   - lc-<version> (e.g. lc-1.6.1)  — versioned, kept as history
#   - librechat-build                — rolling pointer to latest build
name: Build LibreChat

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/librechat-build.yml'
  workflow_dispatch:
    inputs:
      librechat_ref:
        description: "LibreChat git ref to build (branch, tag, or commit). Default: main."
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone and build LibreChat
        run: |
          git clone --depth 1 --branch "${{ inputs.librechat_ref || 'main' }}" \
            https://github.com/danny-avila/LibreChat.git librechat-src
          cd librechat-src
          LC_PKG_VER=$(node -p "require('./package.json').version" 2>/dev/null || echo "unknown")
          LC_COMMIT=$(git rev-parse --short HEAD)
          echo "LC_PKG_VER=${LC_PKG_VER}" >> "$GITHUB_ENV"
          echo "LC_COMMIT=${LC_COMMIT}" >> "$GITHUB_ENV"
          echo "LC_VERSION=${LC_PKG_VER}+${LC_COMMIT}" >> "$GITHUB_ENV"
          echo "LC_TAG=lc-${LC_PKG_VER}" >> "$GITHUB_ENV"
          npm ci
          NODE_OPTIONS="--max-old-space-size=4096" npm run frontend
          cd ..

      - name: Assemble bundle
        run: |
          mkdir -p bundle

          # Copy built LibreChat app (server + client + node_modules)
          cp -r librechat-src/api          bundle/api
          cp -r librechat-src/client       bundle/client
          cp -r librechat-src/packages     bundle/packages 2>/dev/null || true
          cp -r librechat-src/node_modules bundle/node_modules
          cp    librechat-src/package.json bundle/package.json

          # Install MCP Node packages needed at runtime
          cd bundle
          npm install --save @modelcontextprotocol/server-filesystem
          rm -f package-lock.json
          cd ..

          # Embed LibreChat version + build date
          echo "${LC_VERSION}" > bundle/.version
          date -u +%Y-%m-%dT%H:%M:%SZ > bundle/.build-date

          tar czf librechat-build.tar.gz -C bundle .

      - name: Create versioned release (lc-<version>)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LC_TAG }}
          name: "LibreChat ${{ env.LC_VERSION }}"
          body: |
            Vanilla pre-built LibreChat for Uberspace deployment.

            **LibreChat**: ${{ env.LC_PKG_VER }} ([`${{ env.LC_COMMIT }}`](https://github.com/danny-avila/LibreChat/commit/${{ env.LC_COMMIT }}))
            **Built from ref**: `${{ inputs.librechat_ref || 'main' }}`

            Install: `RELEASE_TAG=${{ env.LC_TAG }} augur install`
          files: librechat-build.tar.gz
          prerelease: true
          make_latest: false

      - name: Update rolling release (librechat-build → latest)
        run: |
          # Move the librechat-build tag to current commit
          git tag -f librechat-build
          git push -f origin librechat-build

          # Delete existing release if present, then recreate
          gh release delete librechat-build --yes 2>/dev/null || true
          gh release create librechat-build \
            --title "LibreChat ${{ env.LC_VERSION }} (latest)" \
            --notes "Rolling pointer to the latest LibreChat build.

          **LibreChat**: ${{ env.LC_PKG_VER }} ([\`${{ env.LC_COMMIT }}\`](https://github.com/danny-avila/LibreChat/commit/${{ env.LC_COMMIT }}))
          **Versioned tag**: [\`${{ env.LC_TAG }}\`](https://github.com/${{ github.repository }}/releases/tag/${{ env.LC_TAG }})

          Install: \`RELEASE_TAG=librechat-build augur install\`" \
            --prerelease \
            librechat-build.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
