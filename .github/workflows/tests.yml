name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    name: Shell script tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Syntax check all shell scripts
        run: |
          find . -name '*.sh' -not -path './node_modules/*' -not -path './venv/*' | while read f; do
            echo "Checking: $f"
            bash -n "$f"
          done

      - name: Run bats tests
        run: bats tests/*.bats

  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-asyncio httpx python-dotenv pyyaml

      - name: Run pytest
        run: python -m pytest tests/ -v

  shellcheck:
    name: ShellCheck lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          shellcheck --severity=error \
            librechat-uberspace/scripts/TradeAssistant.sh \
            librechat-uberspace/scripts/setup.sh \
            librechat-uberspace/scripts/setup-data-repo.sh \
            librechat-uberspace/scripts/bootstrap.sh \
            scripts/nightly-git-commit.sh \
            deploy.conf \
          || true

  install-lifecycle:
    name: Install lifecycle (install → pull → update)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (for venv creation in tests)
        run: pip install httpx python-dotenv pymongo

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run install lifecycle tests
        run: bats tests/test_install_lifecycle.bats

  integration-free:
    name: Integration tests (free APIs)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-timeout httpx python-dotenv

      - name: Run free API integration tests
        run: python -m pytest tests/test_integration_free.py -v -m integration --timeout=60

  integration-keyed:
    name: Integration tests (keyed APIs)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-timeout httpx python-dotenv

      - name: Check available API keys
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          echo "=== API Key Availability ==="
          for key in FRED_API_KEY EIA_API_KEY COMTRADE_API_KEY ACLED_API_KEY ACLED_EMAIL USDA_NASS_API_KEY GOOGLE_API_KEY CF_API_TOKEN AISSTREAM_API_KEY; do
            val=$(printenv "$key" 2>/dev/null || true)
            if [ -n "$val" ]; then
              echo "  $key: SET (${#val} chars)"
            else
              echo "  $key: MISSING"
            fi
          done

      - name: Run keyed API integration tests
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python -m pytest tests/test_integration_keyed.py -v -m integration --timeout=60

  integration-llm-keys:
    name: Integration tests (LLM key validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-timeout httpx

      - name: Run LLM key validation tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          GITHUB_MODELS_PAT: ${{ secrets.GITHUB_MODELS_PAT }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python -m pytest tests/test_llm_keys.py -v -m integration --timeout=30

  integration-store:
    name: Integration tests (MongoDB store)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-timeout httpx python-dotenv pymongo

      - name: Derive MongoDB URIs from cluster secret
        env:
          MONGO_CLUSTER_URI: ${{ secrets.MONGO_CLUSTER_URI }}
        run: |
          if [ -n "$MONGO_CLUSTER_URI" ]; then
            BASE="${MONGO_CLUSTER_URI%/}"
            echo "MONGO_URI_SIGNALS=${BASE}/ci_signals" >> "$GITHUB_ENV"
            echo "MONGO_CLUSTER_URI: SET → derived ci_signals"
          else
            echo "MONGO_CLUSTER_URI: MISSING — store tests will be skipped"
          fi

      - name: Run store integration tests
        run: python -m pytest tests/test_integration_store.py -v -m integration --timeout=60

  smoke-combined:
    name: Smoke test (combined server + Atlas)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-timeout httpx python-dotenv pymongo fastmcp

      - name: Derive MongoDB URIs from cluster secret
        env:
          MONGO_CLUSTER_URI: ${{ secrets.MONGO_CLUSTER_URI }}
        run: |
          if [ -n "$MONGO_CLUSTER_URI" ]; then
            BASE="${MONGO_CLUSTER_URI%/}"
            echo "MONGO_URI_SIGNALS=${BASE}/ci_signals" >> "$GITHUB_ENV"
            echo "MONGO_URI_LIBRECHAT=${BASE}/ci_LibreChat" >> "$GITHUB_ENV"
            echo "MONGO_CLUSTER_URI: SET → derived ci_signals + ci_LibreChat"
          else
            echo "MONGO_CLUSTER_URI: MISSING — smoke tests will be skipped"
          fi

      - name: Run combined server smoke tests
        run: python -m pytest tests/test_smoke_combined.py -v -m integration --timeout=120

  smoke-install:
    name: Smoke test (one-liner install)
    runs-on: ubuntu-latest
    needs: [shell-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run install smoke tests
        run: bats tests/test_install_smoke.bats
