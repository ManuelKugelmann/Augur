name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    name: Shell script tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Syntax check all shell scripts
        run: |
          find . -name '*.sh' -not -path './node_modules/*' -not -path './venv/*' | while read f; do
            echo "Checking: $f"
            bash -n "$f"
          done

      - name: Run fast bats tests (excludes slow install tests)
        run: |
          bats \
            tests/test_bootstrap.bats \
            tests/test_claude_auth.bats \
            tests/test_deploy_conf.bats \
            tests/test_health.bats \
            tests/test_proxy.bats \
            tests/test_setup.bats \
            tests/test_ta_cron.bats \
            tests/test_ta_dispatch.bats \
            tests/test_uberspace.bats

  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  shellcheck:
    name: ShellCheck lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          shellcheck --severity=error \
            Augur.sh \
            augur-uberspace/scripts/setup.sh \
            deploy.conf \
          || true

  integration-free:
    name: Integration tests (free APIs)
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run free API integration tests
        run: python -m pytest tests/test_integration_free.py -v -m integration --timeout=60

  integration-keyed:
    name: Integration tests (keyed APIs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Check available API keys
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          OPENSANCTIONS_API_KEY: ${{ secrets.OPENSANCTIONS_API_KEY }}
        run: |
          echo "=== API Key Availability ==="
          for key in FRED_API_KEY EIA_API_KEY COMTRADE_API_KEY ACLED_API_KEY ACLED_EMAIL USDA_NASS_API_KEY GOOGLE_API_KEY CF_API_TOKEN AISSTREAM_API_KEY OPENSANCTIONS_API_KEY; do
            val=$(printenv "$key" 2>/dev/null || true)
            if [ -n "$val" ]; then
              echo "  $key: SET (${#val} chars)"
            else
              echo "  $key: MISSING"
            fi
          done

      - name: Run keyed API integration tests
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          USDA_NASS_API_KEY: ${{ secrets.USDA_NASS_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          OPENSANCTIONS_API_KEY: ${{ secrets.OPENSANCTIONS_API_KEY }}
        run: python -m pytest tests/test_integration_keyed.py -v -m integration --timeout=60

  integration-llm-keys:
    name: Integration tests (LLM key validation)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run LLM key validation tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          GITHUB_MODELS_PAT: ${{ secrets.GITHUB_MODELS_PAT }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python -m pytest tests/test_llm_keys.py -v -m integration --timeout=30

  integration-store:
    name: Integration tests (MongoDB store)
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Derive MongoDB URIs from cluster secret
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            # Strip any existing db name and query params, then append ci db
            SCHEME_AND_HOST="${MONGO_URI%%\?*}"      # remove ?params
            SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"    # remove trailing /
            SCHEME_AND_HOST="${SCHEME_AND_HOST%/*}"   # remove /dbname if present
            # Re-check: if we stripped too far (no / after ://), restore
            if [[ "$SCHEME_AND_HOST" != *"://"*"."* ]]; then
              SCHEME_AND_HOST="${MONGO_URI%%\?*}"
              SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"
            fi
            # Extract query params if any
            if [[ "$MONGO_URI" == *"?"* ]]; then
              PARAMS="?${MONGO_URI#*\?}"
            else
              PARAMS=""
            fi
            echo "MONGO_URI_SIGNALS=${SCHEME_AND_HOST}/ci_signals${PARAMS}" >> "$GITHUB_ENV"
            echo "MONGO_URI: SET → derived ci_signals"
          else
            echo "MONGO_URI: MISSING — store tests will be skipped"
          fi

      - name: Run store integration tests
        run: python -m pytest tests/test_integration_store.py -v -m integration --timeout=60

  smoke-combined:
    name: Smoke test (combined server + Atlas)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Derive MongoDB URIs from cluster secret
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            SCHEME_AND_HOST="${MONGO_URI%%\?*}"
            SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"
            SCHEME_AND_HOST="${SCHEME_AND_HOST%/*}"
            if [[ "$SCHEME_AND_HOST" != *"://"*"."* ]]; then
              SCHEME_AND_HOST="${MONGO_URI%%\?*}"
              SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"
            fi
            if [[ "$MONGO_URI" == *"?"* ]]; then
              PARAMS="?${MONGO_URI#*\?}"
            else
              PARAMS=""
            fi
            echo "MONGO_URI_SIGNALS=${SCHEME_AND_HOST}/ci_signals${PARAMS}" >> "$GITHUB_ENV"
            echo "MONGO_URI_LIBRECHAT=${SCHEME_AND_HOST}/ci_LibreChat${PARAMS}" >> "$GITHUB_ENV"
            echo "MONGO_URI: SET → derived ci_signals + ci_LibreChat"
          else
            echo "MONGO_URI: MISSING — smoke tests will be skipped"
          fi

      - name: Run combined server smoke tests
        run: python -m pytest tests/test_smoke_combined.py -v -m integration --timeout=120

  e2e-smoke:
    name: E2E smoke (LibreChat + trading server)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [python-tests, smoke-combined]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements-test.txt

      - name: Derive MongoDB URIs
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "MONGO_URI not set — e2e tests will be skipped"
            exit 0
          fi
          SCHEME_AND_HOST="${MONGO_URI%%\?*}"
          SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"
          SCHEME_AND_HOST="${SCHEME_AND_HOST%/*}"
          if [[ "$SCHEME_AND_HOST" != *"://"*"."* ]]; then
            SCHEME_AND_HOST="${MONGO_URI%%\?*}"
            SCHEME_AND_HOST="${SCHEME_AND_HOST%/}"
          fi
          if [[ "$MONGO_URI" == *"?"* ]]; then
            PARAMS="?${MONGO_URI#*\?}"
          else
            PARAMS=""
          fi
          echo "MONGO_URI_SIGNALS=${SCHEME_AND_HOST}/ci_e2e_signals${PARAMS}" >> "$GITHUB_ENV"
          echo "MONGO_URI_LIBRECHAT=${SCHEME_AND_HOST}/ci_e2e_LibreChat${PARAMS}" >> "$GITHUB_ENV"
          echo "MONGO_URI: SET → derived ci_e2e_signals + ci_e2e_LibreChat"

      - name: Run E2E smoke tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python -m pytest tests/test_e2e_smoke.py -v -m "integration and e2e" --timeout=180

      - name: Cleanup E2E databases
        if: always()
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python3 -c "
          import os, sys
          uri = os.environ.get('MONGO_URI', '')
          if not uri:
              sys.exit(0)
          try:
              from pymongo import MongoClient
              scheme = uri.split('?')[0].rstrip('/').rsplit('/', 1)[0]
              params = '?' + uri.split('?')[1] if '?' in uri else ''
              for db_name in ('ci_e2e_signals', 'ci_e2e_LibreChat'):
                  client = MongoClient(f'{scheme}/{db_name}{params}', serverSelectionTimeoutMS=5000)
                  client.drop_database(db_name)
                  client.close()
                  print(f'Dropped {db_name}')
          except Exception as e:
              print(f'Cleanup warning: {e}')
          " || true

