name: Seed Extract

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

permissions:
  contents: write

jobs:
  extract:
    name: Extract profiles from Atlas to seed files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo

      - name: Extract profiles
        env:
          MONGO_URI_SIGNALS: ${{ secrets.MONGO_URI_SIGNALS }}
        run: |
          if [ -z "$MONGO_URI_SIGNALS" ]; then
            echo "ERROR: MONGO_URI_SIGNALS secret not configured"
            exit 1
          fi
          python scripts/extract-seeds.py --profiles-dir profiles

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet profiles/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No profile changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Profile changes detected:"
            git diff --stat profiles/
          fi

      - name: Commit and push to seeddata branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B seeddata
          git add profiles/
          git commit -m "chore: extract seed profiles from Atlas

          Automated weekly extraction of profile data from MongoDB Atlas.
          $(git diff --cached --stat | tail -1)"
          git push -u origin seeddata --force-with-lease
