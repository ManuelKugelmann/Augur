name: Install Tests

on:
  push:
    branches: [main]
    paths:
      - 'augur-uberspace/scripts/**'
      - 'deploy.conf'
      - 'requirements.txt'
      - '.env.example'
      - 'tests/install/**'
      - 'tests/helpers/**'
      - '.github/workflows/tests-install.yml'
  pull_request:
    branches: [main]
    paths:
      - 'augur-uberspace/scripts/**'
      - 'deploy.conf'
      - 'requirements.txt'
      - '.env.example'
      - 'tests/install/**'
      - 'tests/helpers/**'
      - '.github/workflows/tests-install.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install-tests:
    name: Install integration tests (bats, slow)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system numpy (prebuilt, skip compilation)
        run: sudo apt-get install -y python3-numpy

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run install integration tests
        run: bats tests/install/*.bats
