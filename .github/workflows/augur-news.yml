name: Deploy Augur News to Pages

on:
  push:
    branches: [main, augur]
    paths:
      - 'augur-site/**'
      - '.github/workflows/augur-news.yml'
  pull_request:
    paths:
      - 'augur-site/**'
      - '.github/workflows/augur-news.yml'
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: augur-site
    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: augur-site

      - name: Configure build
        id: config
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "baseurl=/preview" >> "$GITHUB_OUTPUT"
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseurl=" >> "$GITHUB_OUTPUT"
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.config.outputs.baseurl }}"
        env:
          JEKYLL_ENV: production

      # --- Production: update root, preserve preview/ ---
      - name: Deploy production
        if: steps.config.outputs.is_preview == 'false'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Preserve existing preview/ from augur_news
          if git fetch origin augur_news --depth=1 2>/dev/null; then
            git checkout augur_news -- preview/ 2>/dev/null || true
            if [ -d preview ]; then
              cp -r preview augur-site/_site/preview
            fi
          fi

          cd augur-site/_site
          touch .nojekyll
          echo "augur.news" > CNAME

          git init
          git checkout -b augur_news
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" augur_news

      # --- Preview: replace preview/, preserve root ---
      - name: Deploy preview
        if: steps.config.outputs.is_preview == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git clone --branch augur_news --single-branch --depth=1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            _deploy 2>/dev/null || {
              mkdir _deploy && cd _deploy && git init && git checkout -b augur_news
              touch .nojekyll
              echo "augur.news" > CNAME
              cd ..
            }

          rm -rf _deploy/preview
          mkdir -p _deploy/preview
          cp -r augur-site/_site/* _deploy/preview/

          cd _deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Deploy preview (PR #${{ github.event.pull_request.number }})"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" augur_news

      - name: Comment preview URL on PR
        if: steps.config.outputs.is_preview == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `**Jekyll preview deployed**\n\nhttps://augur.news/preview/`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Jekyll preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --- Cleanup preview/ when PR closes ---
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview from augur_news
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --branch augur_news --single-branch --depth=1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            _deploy 2>/dev/null || exit 0

          cd _deploy
          if [ -d preview ]; then
            git rm -rf preview
            git commit -m "Remove preview (PR #${{ github.event.pull_request.number }} closed)"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" augur_news
          fi
