name: Deploy Augur News to Pages

on:
  # Theme/layout changes on main + new articles on augur_news data branch
  # Note: path filters can't differ per branch in a single push trigger.
  # augur_news pushes always rebuild (data-only branch, every push matters).
  # main/augur pushes also rebuild — acceptable cost for a small Jekyll site.
  push:
    branches: [main, augur, augur_news]
  # PR preview for theme changes
  pull_request:
    paths:
      - 'augur-site/**'
      - '.github/workflows/augur-news.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (Jekyll source)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && contains(github.ref, 'augur_news') && 'main' || github.ref }}
          path: main

      - name: Checkout augur_news (data branch)
        uses: actions/checkout@v6
        with:
          ref: augur_news
          path: data
        continue-on-error: true

      - name: Merge source + data
        run: |
          # Start with Jekyll source from main
          cp -r main/augur-site site

          # Overlay data from augur_news branch (articles, assets, data)
          if [ -d data/_posts ]; then
            cp -r data/_posts/* site/_posts/ 2>/dev/null || true
          fi
          if [ -d data/_data ]; then
            cp -r data/_data/* site/_data/ 2>/dev/null || true
          fi
          if [ -d data/assets ]; then
            cp -r data/assets/* site/assets/ 2>/dev/null || true
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: site

      - name: Build with Jekyll
        working-directory: site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
