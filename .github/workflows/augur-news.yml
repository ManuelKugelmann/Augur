name: Deploy Augur News to Pages

on:
  # Theme/layout changes on main + new articles on augur_news data branch
  push:
    branches: [main, augur, augur_news]
  # PR preview for theme changes
  pull_request:
    paths:
      - 'augur-site/**'
      - '.github/workflows/augur-news.yml'
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (Jekyll source)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && contains(github.ref, 'augur_news') && 'main' || github.ref }}
          path: main

      - name: Checkout augur_news (data branch)
        uses: actions/checkout@v6
        with:
          ref: augur_news
          path: data
        continue-on-error: true

      - name: Merge source + data
        run: |
          # Start with Jekyll source from main
          cp -r main/augur-site site

          # Overlay data from augur_news branch (articles, assets, data)
          if [ -d data/_posts ]; then
            cp -r data/_posts/* site/_posts/ 2>/dev/null || true
          fi
          if [ -d data/_data ]; then
            cp -r data/_data/* site/_data/ 2>/dev/null || true
          fi
          if [ -d data/assets ]; then
            cp -r data/assets/* site/assets/ 2>/dev/null || true
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: site

      - name: Configure build
        id: config
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Jekyll
        working-directory: site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        if: steps.config.outputs.is_preview == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        if: steps.config.outputs.is_preview == 'false'
        id: deployment
        uses: actions/deploy-pages@v4

      # --- PR preview: deploy to a preview branch ---
      - name: Deploy preview
        if: steps.config.outputs.is_preview == 'true'
        run: |
          cd site/_site
          touch .nojekyll
          echo "augur.news" > CNAME

          git init
          git checkout -b augur_news_preview
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy preview (PR #${{ github.event.pull_request.number }})"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" augur_news_preview

      - name: Comment preview URL on PR
        if: steps.config.outputs.is_preview == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `**Jekyll preview deployed**\n\nhttps://augur.news/preview/`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Jekyll preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --- Cleanup preview when PR closes ---
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove preview branch
        run: |
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            --delete augur_news_preview 2>/dev/null || echo "Preview branch already gone"
