name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main, augur]
    paths:
      - 'augur-site/**'
      - '.github/workflows/jekyll-deploy.yml'
  pull_request:
    paths:
      - 'augur-site/**'
      - '.github/workflows/jekyll-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'production' }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: augur-site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: augur-site

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set baseurl for PR preview
        id: baseurl
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "baseurl=/pr-preview/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "dest=_site/pr-preview/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "baseurl=${{ steps.pages.outputs.base_path }}" >> "$GITHUB_OUTPUT"
            echo "dest=_site" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.baseurl.outputs.baseurl }}" --destination "${{ steps.baseurl.outputs.dest }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: augur-site/_site

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-preview:
    if: github.event_name == 'pull_request'
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: "${{ steps.deployment.outputs.page_url }}pr-preview/pr-${{ github.event.pull_request.number }}/"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${process.env.PAGES_URL}pr-preview/pr-${context.issue.number}/`;
            const body = `📄 **Jekyll preview deployed**\n\n${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Jekyll preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
