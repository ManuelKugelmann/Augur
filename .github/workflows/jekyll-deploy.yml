name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main, augur]
    paths:
      - 'augur-site/**'
      - '.github/workflows/jekyll-deploy.yml'
  pull_request:
    paths:
      - 'augur-site/**'
      - '.github/workflows/jekyll-deploy.yml'
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: augur-site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: augur-site

      - name: Set baseurl
        id: config
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "baseurl=/pr-preview/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "preview=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "baseurl=" >> "$GITHUB_OUTPUT"
            echo "preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.config.outputs.baseurl }}"
        env:
          JEKYLL_ENV: production

      # --- Production deploy: update root, preserve pr-preview/ ---
      - name: Deploy production (preserve previews)
        if: steps.config.outputs.preview == 'false'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch gh-pages if it exists
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            git checkout gh-pages -- pr-preview/ 2>/dev/null || true
            # Copy preserved pr-preview into the build output
            if [ -d pr-preview ]; then
              cp -r pr-preview augur-site/_site/pr-preview
            fi
          fi

          cd augur-site/_site
          touch .nojekyll
          echo "augur.news" > CNAME

          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy production site"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

      # --- PR preview deploy: update only pr-preview/pr-N/, preserve everything else ---
      - name: Deploy PR preview (preserve root)
        if: steps.config.outputs.preview == 'true'
        run: |
          PR_NUM="${{ steps.config.outputs.pr_number }}"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch --depth=1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            _gh-pages 2>/dev/null || {
              mkdir _gh-pages && cd _gh-pages && git init && git checkout -b gh-pages
              touch .nojekyll
              echo "augur.news" > CNAME
              cd ..
            }

          # Replace only this PR's preview subfolder
          rm -rf "_gh-pages/pr-preview/pr-${PR_NUM}"
          mkdir -p "_gh-pages/pr-preview/pr-${PR_NUM}"
          cp -r augur-site/_site/* "_gh-pages/pr-preview/pr-${PR_NUM}/"

          cd _gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy PR #${PR_NUM} preview"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

      - name: Comment preview URL on PR
        if: steps.config.outputs.preview == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = ${{ steps.config.outputs.pr_number }};
            const url = `https://augur.news/pr-preview/pr-${prNum}/`;
            const body = `**Jekyll preview deployed**\n\n${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c => c.body.includes('Jekyll preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

  # --- Cleanup: remove preview subfolder when PR is closed/merged ---
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove PR preview from gh-pages
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --branch gh-pages --single-branch --depth=1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            _gh-pages 2>/dev/null || exit 0

          cd _gh-pages
          if [ -d "pr-preview/pr-${PR_NUM}" ]; then
            git rm -rf "pr-preview/pr-${PR_NUM}"
            git commit -m "Remove PR #${PR_NUM} preview"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
            echo "Cleaned up preview for PR #${PR_NUM}"
          else
            echo "No preview found for PR #${PR_NUM}, nothing to clean"
          fi
