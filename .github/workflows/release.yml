# Build pre-built LibreChat bundle and create GitHub release.
# The bundle is a vanilla LibreChat build + MCP node packages + our config/scripts.
# Versioned by LibreChat's package.json version + commit hash.
# Uberspace gets a ready-to-run app — no build step on the host.
#
# Triggers:
#   - Tag push:    git tag v0.1.0 && git push --tags
#   - Manual:      Actions → Release LibreChat Bundle → Run workflow
#                  (optional version input, defaults to "dev-<sha>")
name: Release LibreChat Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0-rc1). Leave empty for dev-<sha>."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push — use the tag as-is
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            # Manual with explicit version
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Manual without version — dev build
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone and build LibreChat
        run: |
          git clone --depth 1 https://github.com/danny-avila/LibreChat.git librechat-src
          cd librechat-src
          # Capture LibreChat source version (package.json version + short commit)
          LC_PKG_VER=$(node -p "require('./package.json').version" 2>/dev/null || echo "unknown")
          LC_COMMIT=$(git rev-parse --short HEAD)
          echo "LC_VERSION=${LC_PKG_VER}+${LC_COMMIT}" >> "$GITHUB_ENV"
          npm ci
          npm run frontend
          cd ..

      - name: Assemble bundle
        run: |
          mkdir -p bundle

          # Copy built LibreChat app (server + client + node_modules)
          cp -r librechat-src/api       bundle/api
          cp -r librechat-src/client     bundle/client
          cp -r librechat-src/packages   bundle/packages 2>/dev/null || true
          cp -r librechat-src/node_modules bundle/node_modules
          cp    librechat-src/package.json bundle/package.json

          # Install MCP Node packages into existing node_modules
          cd bundle
          npm install --save \
            @modelcontextprotocol/server-filesystem
          rm -f package-lock.json
          cd ..

          # Add our config and scripts
          mkdir -p bundle/config bundle/scripts
          cp deploy.conf                                bundle/
          cp librechat-uberspace/config/librechat.yaml  bundle/config/
          cp librechat-uberspace/config/.env.example    bundle/config/
          cp librechat-uberspace/scripts/setup.sh       bundle/scripts/
          cp librechat-uberspace/scripts/bootstrap.sh   bundle/scripts/
          cp librechat-uberspace/scripts/TradeAssistant.sh bundle/scripts/
          cp librechat-uberspace/scripts/setup-data-repo.sh bundle/scripts/

          # Embed LibreChat version in bundle (used by ta install for update checks)
          echo "${LC_VERSION}" > bundle/.version

          # Create tarball
          tar czf librechat-bundle.tar.gz -C bundle .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            librechat-bundle.tar.gz
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
