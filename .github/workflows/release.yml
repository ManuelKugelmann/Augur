# Augur release — config, scripts, and deployment bundle.
# Does NOT include LibreChat (that's built separately via librechat-build.yml).
# Usage: git tag v0.1.0 && git push --tags
name: Release Augur

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
