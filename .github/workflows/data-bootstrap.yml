name: Data Bootstrap

on:
  workflow_dispatch:
    inputs:
      kind:
        description: 'Profile kind to bootstrap (blank = all)'
        required: false
        type: string
      batch_size:
        description: 'Entities per API call (default: 10)'
        required: false
        default: '10'
        type: string
      dry_run:
        description: 'Dry run (preview prompts only)'
        required: false
        default: true
        type: boolean
      data_branch:
        description: 'Branch to push profile data to (blank = skip push)'
        required: false
        default: 'data/bootstrap'
        type: string

jobs:
  bootstrap:
    name: Bootstrap profile data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Check prerequisites
        env:
          TA_AGENTS_API_KEY: ${{ secrets.TA_AGENTS_API_KEY }}
          TA_BOOTSTRAP_AGENT_ID: ${{ secrets.TA_BOOTSTRAP_AGENT_ID }}
          LIBRECHAT_BASE_URL: ${{ secrets.LIBRECHAT_BASE_URL }}
        run: |
          echo "=== Bootstrap Configuration ==="
          if [ -n "$TA_AGENTS_API_KEY" ]; then
            echo "  TA_AGENTS_API_KEY: SET (${#TA_AGENTS_API_KEY} chars)"
          else
            echo "  TA_AGENTS_API_KEY: MISSING"
          fi
          if [ -n "$TA_BOOTSTRAP_AGENT_ID" ]; then
            echo "  TA_BOOTSTRAP_AGENT_ID: $TA_BOOTSTRAP_AGENT_ID"
          else
            echo "  TA_BOOTSTRAP_AGENT_ID: MISSING"
          fi
          if [ -n "$LIBRECHAT_BASE_URL" ]; then
            echo "  LIBRECHAT_BASE_URL: $LIBRECHAT_BASE_URL"
          else
            echo "  LIBRECHAT_BASE_URL: not set (will use default localhost:3080)"
          fi
          echo "  Kind: ${{ inputs.kind || 'all' }}"
          echo "  Batch size: ${{ inputs.batch_size }}"
          echo "  Dry run: ${{ inputs.dry_run }}"
          echo "  Data branch: ${{ inputs.data_branch || '(skip push)' }}"

      - name: Run bootstrap
        env:
          TA_AGENTS_API_KEY: ${{ secrets.TA_AGENTS_API_KEY }}
          TA_BOOTSTRAP_AGENT_ID: ${{ secrets.TA_BOOTSTRAP_AGENT_ID }}
          LIBRECHAT_BASE_URL: ${{ secrets.LIBRECHAT_BASE_URL }}
        run: |
          ARGS=""

          # API credentials (skip for dry-run)
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            if [ -z "$TA_AGENTS_API_KEY" ] || [ -z "$TA_BOOTSTRAP_AGENT_ID" ]; then
              echo "ERROR: TA_AGENTS_API_KEY and TA_BOOTSTRAP_AGENT_ID secrets required for live run"
              exit 1
            fi
            ARGS="$ARGS --api-key $TA_AGENTS_API_KEY --agent-id $TA_BOOTSTRAP_AGENT_ID"
            if [ -n "$LIBRECHAT_BASE_URL" ]; then
              ARGS="$ARGS --base-url $LIBRECHAT_BASE_URL"
            fi
          fi

          # Kind filter
          if [ -n "${{ inputs.kind }}" ]; then
            ARGS="$ARGS --kind ${{ inputs.kind }}"
          fi

          # Batch size
          ARGS="$ARGS --batch-size ${{ inputs.batch_size }}"

          # Dry run
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python librechat-uberspace/scripts/bootstrap-data.py $ARGS

      - name: Validate profiles after bootstrap
        if: inputs.dry_run != true
        run: |
          pip install pytest pytest-asyncio python-dotenv pyyaml pandas ./wheels/ta-0.11.0-py3-none-any.whl
          python -m pytest tests/test_store.py -v -k "lint" --tb=short || true

      - name: Push profiles and INDEX files to data branch
        if: inputs.dry_run != true && inputs.data_branch != ''
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.data_branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to data branch
          git checkout -B "$BRANCH"

          # Stage profiles and INDEX files
          git add profiles/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No profile changes to commit"
            exit 0
          fi

          # Build commit message
          KIND_MSG="${{ inputs.kind || 'all kinds' }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          PROFILE_COUNT=$(find profiles -name '*.json' -not -path '*/SCHEMAS/*' -not -name 'INDEX_*' | wc -l)
          INDEX_COUNT=$(find profiles -name 'INDEX_*.json' | wc -l)

          git commit -m "$(cat <<EOF
          bootstrap: ${KIND_MSG} — ${PROFILE_COUNT} profiles, ${INDEX_COUNT} indexes

          Automated bootstrap run at ${TIMESTAMP}.
          Batch size: ${{ inputs.batch_size }}
          EOF
          )"

          git push -u origin "$BRANCH"
          echo "Pushed to branch: $BRANCH"
