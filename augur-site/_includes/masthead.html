{% assign brand_key = page.brand | default: "the" %}
{% assign brand = site.data.brands[brand_key] %}
<header class="masthead">
  <div class="masthead__brand">
    <a href="{{ '/' | append: brand.slug | append: '/' | relative_url }}?v={{ site.time | date: '%s' }}" class="masthead__title">{{ brand.masthead | default: "THE AUGUR" }}</a>
    <div class="masthead__subtitle">{{ brand.subtitle | default: "Foresight from the signal noise" }}</div>
  </div>
  <nav class="masthead__nav">
    {% for h in brand.horizons %}
    <a class="masthead__link{% if page.horizon == h.key %} masthead__link--active{% endif %}"
       href="{{ '/' | append: brand.slug | append: '/' | append: h.slug | append: '/' | relative_url }}?v={{ site.time | date: '%s' }}">
      {{ h.label }}
    </a>
    {% endfor %}
  </nav>
</header>
<script>
(function() {
  var SUN = '\u263C', MOON = '\u263E';
  var t = localStorage.getItem('augur-theme') || '';
  if (t) document.body.setAttribute('data-theme', t);

  function updateToggle() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var dark = document.body.getAttribute('data-theme') === 'dark';
    btn.textContent = dark ? SUN : MOON;
    btn.title = dark ? 'Light mode' : 'Dark mode';
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('#theme-toggle')) return;
    var dark = document.body.getAttribute('data-theme') === 'dark';
    if (dark) {
      document.body.removeAttribute('data-theme');
      localStorage.removeItem('augur-theme');
    } else {
      document.body.setAttribute('data-theme', 'dark');
      localStorage.setItem('augur-theme', 'dark');
    }
    updateToggle();
  });

  updateToggle();
})();
</script>
