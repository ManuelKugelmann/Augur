{% assign brand_key = page.brand | default: "the" %}
{% assign brand = site.data.brands[brand_key] %}
{% assign locale = brand.locale | default: "en" %}
<footer class="page-footer">
  <div class="theme-switcher">
    <button class="theme-switcher__btn" data-set-theme="">Classic</button>
    <button class="theme-switcher__btn" data-set-theme="dark">Dark</button>
  </div>
  <p>
    {% if locale == "de" %}
    <a href="{{ '/impressum/' | relative_url }}">Impressum</a> &middot;
    <a href="{{ '/datenschutz/' | relative_url }}">Datenschutz</a> &middot;
    {% else %}
    <a href="{{ '/impressum/' | relative_url }}">Legal Notice</a> &middot;
    <a href="{{ '/datenschutz/' | relative_url }}">Privacy Policy</a> &middot;
    {% endif %}
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </p>
</footer>
