# LibreChat Lite configuration
# MCP servers + minimal config for Uberspace deployment
version: 1.2.1

cache: true

registration:
  socialLogins: []

interface:
  endpointsMenu: true

# ── MCP Servers ─────────────────────────────
# All data stored under ~/librechat-data/ (git-versioned)
mcpServers:
  # File read/write — documents, exports, research files
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /home/user/librechat-data/files/
    serverInstructions: |
      Filesystem for persistent file storage.
      Use for documents, research exports, CSV files, reports.
      All files are git-versioned and synced to GitHub.

  # Knowledge graph — entities and relations in JSONL
  # NOTE: npx may ignore MEMORY_FILE_PATH in some versions.
  # If memory.jsonl doesn't appear in ~/librechat-data/, symlink the npx cache file there.
  memory:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"
    env:
      MEMORY_FILE_PATH: /home/user/librechat-data/memory.jsonl
    serverInstructions: |
      Persistent memory as a knowledge graph.
      Store entities (people, projects, preferences) and their relations.
      Use for context that should persist across conversations.

  # SQLite — structured queryable data
  sqlite:
    command: npx
    args:
      - -y
      - mcp-sqlite
      - /home/user/librechat-data/data.db
    serverInstructions: |
      SQLite database for structured data.
      Use for logs, research results, structured notes, transaction records.
      Supports full SQL: CREATE TABLE, INSERT, SELECT, UPDATE, DELETE.

